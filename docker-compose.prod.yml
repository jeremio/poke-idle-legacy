services:
  postgres:
    image: postgres:16-alpine
    container_name: poke-idle-postgres
    restart: always
    shm_size: 256mb
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_connections=80
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=32MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  server:
    image: ghcr.io/jeremyduc73/poke-idle-legacy/server:latest
    container_name: poke-idle-server
    restart: always
    ports:
      - "3005:3333"
    deploy:
      resources:
        limits:
          cpus: '2.5'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      SESSION_DRIVER: cookie
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://poke-idle.jeremyduc.dev/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-https://poke-idle.jeremyduc.dev}
    volumes:
      - server_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  client:
    image: ghcr.io/jeremyduc73/poke-idle-legacy/client:latest
    container_name: poke-idle-client
    restart: always
    ports:
      - "3004:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      NUXT_PUBLIC_API_BASE: ${API_BASE_URL:-https://api.poke-idle.example.com}
    depends_on:
      - server
    networks:
      - web

volumes:
  postgres_data:
  server_storage:

networks:
  internal:
  web:
